name: Content Pipeline

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Install dependencies
        run: pip install requests

      # 🔥 RUN BOTH SCRIPTS FIRST
      - name: Fetch Medium posts
        run: python scripts/fetch_medium.py

      - name: Fetch GitHub repos
        run: python scripts/fetch_github.py

      # 🔥 THEN COMMIT BOTH FILES
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@users.noreply.github.com"
          git add data/blog.json data/repos.json
          git commit -m "Update blog + repos" || echo "No changes"
          git push
