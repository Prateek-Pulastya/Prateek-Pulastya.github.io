<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prateek Pulastya — AI Security & Red Team Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #080c10;
  --surface: #0d1117;
  --border: #1a2332;
  --accent: #00ff88;
  --accent2: #00bfff;
  --warn: #ff4444;
  --text: #e2e8f0;
  --muted: #4a5568;
  --card: #111827;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;cursor:none}

/* NAV */
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;padding:1.5rem 4rem;z-index:100}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;font-family:'Space Mono',monospace;font-size:.8rem}
.nav-links a:hover{color:var(--accent)}

/* SECTIONS */
section{padding:6rem 4rem}
.section-label{color:var(--accent);font-family:'Space Mono';margin-bottom:2rem}

/* GRID */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}

/* CARDS */
.project-card,.blog-card{
  background:var(--card);
  border:1px solid var(--border);
  padding:1.5rem;
  transition:.3s;
}
.project-card:hover,.blog-card:hover{border-color:var(--accent);transform:translateY(-4px)}

/* BLOG */
.blog-top{display:flex;justify-content:space-between;font-size:.7rem;font-family:'Space Mono'}
.blog-index{color:var(--accent)}
.blog-date{color:var(--muted)}
.blog-title{font-weight:700;margin:.5rem 0}
.blog-desc{color:var(--muted);font-size:.85rem}
.blog-link{color:var(--accent);text-decoration:none;font-family:'Space Mono'}

/* PROJECT */
.project-title{font-weight:700}
.project-desc{font-size:.85rem;color:var(--muted)}
.tag{font-size:.7rem;border:1px solid var(--border);padding:2px 6px;margin-right:5px}

/* CONTACT */
.contact-section{text-align:center}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<ul class="nav-links">
<li><a href="#projects">Projects</a></li>
<li><a href="#blog">Research</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<!-- PROJECTS -->
<section id="projects">
<div class="section-label">Projects</div>
<div class="projects-grid"></div>
</section>

<!-- BLOG -->
<section id="blog">
<div class="section-label">Research Logs</div>
<div id="blog-container" class="projects-grid"></div>
</section>

<!-- CONTACT -->
<section id="contact">
<div class="contact-section">
<h2>Let's work together</h2>
</div>
</section>

<script>

/* BLOG SYSTEM */
async function loadBlog() {
  try {
    const res = await fetch("data/blog.json");
    const posts = await res.json();

    const container = document.getElementById("blog-container");

    posts.forEach((post, index) => {
      const card = document.createElement("div");
      card.className = "blog-card";

      card.innerHTML = `
        <div class="blog-top">
          <span class="blog-index">0${index+1}</span>
          <span class="blog-date">${new Date(post.date).toLocaleDateString()}</span>
        </div>
        <div class="blog-title">${post.title}</div>
        <div class="blog-desc">${post.desc}</div>
        <a href="${post.link}" target="_blank" class="blog-link">READ ↗</a>
      `;

      container.appendChild(card);
    });

  } catch (e) {
    console.error("Blog failed", e);
  }
}

/* GITHUB SYSTEM */
async function loadRepos() {
  try {
    const res = await fetch("data/repos.json");
    const repos = await res.json();

    const container = document.querySelector("#projects .projects-grid");

    container.innerHTML = "<p style='color:gray'>Loading repos...</p>";

    container.innerHTML = "";

    repos.forEach((repo, index) => {
      const card = document.createElement("div");
      card.className = "project-card";

      card.innerHTML = `
        <div class="project-title">${repo.name}</div>
        <div class="project-desc">${repo.desc}</div>
        <div>
          <span class="tag">${repo.language || "Code"}</span>
          <span class="tag">⭐ ${repo.stars}</span>
        </div>
        <a href="${repo.url}" target="_blank">View Repo ↗</a>
      `;

      container.appendChild(card);
    });

  } catch (e) {
    console.error("Repo failed", e);
  }
}

/* RUN SYSTEMS */
loadBlog();
loadRepos();

</script>

</body>
</html>
